name: Deploy

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ${{ secrets.SSH_PATH }}

            # Clean up stale git lock files
            rm -f .git/index.lock .git/FETCH_HEAD

            git fetch origin main
            git reset --hard origin/main

            # Free disk space: clean orphaned git objects and unused docker images
            git gc --prune=all --quiet
            docker image prune -f

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              COMPOSE="docker compose"
            fi

            echo "Using: $COMPOSE"

            # Stop ALL containers and also kill any stray processes on ports 3000/8000
            $COMPOSE down || true
            fuser -k 3000/tcp 2>/dev/null || true
            fuser -k 8000/tcp 2>/dev/null || true

            # Build and start
            if $COMPOSE build; then
              echo "Build succeeded"
            else
              echo "Build FAILED - will use existing images"
            fi
            $COMPOSE up -d
            echo "Deploy done"
