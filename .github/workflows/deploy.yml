name: Deploy

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ${{ secrets.SSH_PATH }}

            # Clean up any stale git lock files
            rm -f .git/index.lock .git/FETCH_HEAD

            git fetch origin main
            git reset --hard origin/main

            # Build first - if build fails, keep old containers running
            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              COMPOSE="docker compose"
            fi

            echo "Using: $COMPOSE"
            $COMPOSE build && $COMPOSE up -d || $COMPOSE up -d
            echo "Deploy done"
