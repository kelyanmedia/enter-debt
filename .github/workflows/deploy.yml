name: Deploy

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ${{ secrets.SSH_PATH }}

            # Clean up stale git lock files
            rm -f .git/index.lock .git/FETCH_HEAD

            git fetch origin main
            git reset --hard origin/main

            # Free disk space: clean orphaned git objects and unused docker images
            git gc --prune=all --quiet
            docker image prune -f

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              COMPOSE="docker compose"
            fi

            echo "Using: $COMPOSE"

            # Show disk usage and running processes for debugging
            df -h | tail -3
            echo "--- Docker containers before ---"
            $COMPOSE ps 2>/dev/null || docker ps 2>/dev/null || echo "no docker"

            # Build and start containers
            if $COMPOSE build; then
              echo "Build succeeded"
            else
              echo "Build FAILED - will use existing images"
            fi
            $COMPOSE up -d --force-recreate

            # Give containers a moment to start
            sleep 5

            echo "--- Docker containers after ---"
            $COMPOSE ps 2>/dev/null || docker ps 2>/dev/null

            # Restart nginx if available
            systemctl restart nginx 2>/dev/null || service nginx restart 2>/dev/null || true

            # Show what's listening on ports
            echo "--- Port 3000 ---"
            ss -tlnp 2>/dev/null | grep 3000 || netstat -tlnp 2>/dev/null | grep 3000 || echo "nothing on 3000"
            echo "--- Port 8000 ---"
            ss -tlnp 2>/dev/null | grep 8000 || netstat -tlnp 2>/dev/null | grep 8000 || echo "nothing on 8000"

            echo "Deploy done"
