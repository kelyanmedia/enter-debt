name: Deploy

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ${{ secrets.SSH_PATH }}

            # Clean up stale git lock files
            rm -f .git/index.lock .git/FETCH_HEAD

            git fetch origin main
            git reset --hard origin/main

            # Free disk space: clean orphaned git objects and unused docker images
            git gc --prune=all --quiet
            docker image prune -f

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              COMPOSE="docker compose"
            fi

            echo "Using: $COMPOSE"

            # Show disk usage and running processes for debugging
            df -h | tail -3
            echo "--- Docker containers before ---"
            $COMPOSE ps 2>/dev/null || docker ps 2>/dev/null || echo "no docker"

            # Stop and remove containers first (avoids KeyError: ContainerConfig bug in docker-compose v1)
            $COMPOSE stop 2>/dev/null || true
            $COMPOSE rm -f 2>/dev/null || true

            # Build new images
            if $COMPOSE build; then
              echo "Build succeeded"
            else
              echo "Build FAILED - will use existing images"
            fi

            # Start containers fresh
            $COMPOSE up -d

            # Give containers time to initialize
            sleep 8

            echo "--- Docker containers ---"
            $COMPOSE ps 2>/dev/null || docker ps 2>/dev/null

            echo "--- Port 3000 ---"
            ss -tlnp 2>/dev/null | grep 3000 || echo "nothing on 3000"
            echo "--- Port 8000 ---"
            ss -tlnp 2>/dev/null | grep 8000 || echo "nothing on 8000"

            # Restart nginx
            systemctl restart nginx 2>/dev/null || service nginx restart 2>/dev/null || echo "nginx restart skipped"

            echo "Deploy done"
