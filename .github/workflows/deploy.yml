name: Deploy

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ${{ secrets.SSH_PATH }}

            # ── DATABASE BACKUP ──────────────────────────────────────────
            mkdir -p db_backups
            if [ -f .env ]; then
              DB_URL=$(grep '^DATABASE_URL=' .env | cut -d '=' -f2- | tr -d '"' | tr -d "'")
            fi
            if [ -n "$DB_URL" ]; then
              BACKUP_FILE="db_backups/backup_$(date +%Y%m%d_%H%M%S).sql"
              if pg_dump "$DB_URL" > "$BACKUP_FILE" 2>/dev/null; then
                echo "DB backup saved: $BACKUP_FILE"
                # Keep only last 7 backups
                ls -t db_backups/backup_*.sql 2>/dev/null | tail -n +8 | xargs rm -f 2>/dev/null || true
              else
                echo "DB backup skipped (pg_dump not available or connection failed)"
                rm -f "$BACKUP_FILE"
              fi
            else
              echo "DB backup skipped (DATABASE_URL not found in .env)"
            fi
            # ─────────────────────────────────────────────────────────────

            # Clean up stale git lock files
            rm -f .git/index.lock .git/FETCH_HEAD

            git fetch origin main
            git reset --hard origin/main
            export GIT_COMMIT="$(git rev-parse HEAD)"

            # Free disk space: clean orphaned git objects and unused docker images
            git gc --prune=all --quiet
            docker image prune -f

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              COMPOSE="docker compose"
            fi

            echo "Using: $COMPOSE"

            # Show disk usage and running processes for debugging
            df -h | tail -3
            echo "--- Docker containers before ---"
            $COMPOSE ps 2>/dev/null || docker ps 2>/dev/null || echo "no docker"

            # Stop and remove containers first (avoids KeyError: ContainerConfig bug in docker-compose v1)
            $COMPOSE stop 2>/dev/null || true
            $COMPOSE rm -f 2>/dev/null || true

            # Build images (GIT_COMMIT сбрасывает кэш слоя npm run build у frontend)
            if ! $COMPOSE build --pull; then
              echo "ERROR: docker compose build failed — оставляем старые контейнеры, деплой прерван."
              exit 1
            fi
            echo "Build succeeded"

            # Новые контейнеры из свежих образов (иначе иногда остаётся старый UI)
            $COMPOSE up -d --force-recreate --remove-orphans

            # Give containers time to initialize (Next.js needs a few seconds)
            sleep 12

            echo "--- Docker containers ---"
            $COMPOSE ps 2>/dev/null || docker ps 2>/dev/null

            echo "--- Port 3000 ---"
            ss -tlnp 2>/dev/null | grep 3000 || echo "nothing on 3000"
            echo "--- Port 8000 ---"
            ss -tlnp 2>/dev/null | grep 8000 || echo "nothing on 8000"

            # ── Smoke tests (fail deploy if stack is not reachable on localhost) ──
            FAIL=0
            if ! curl -fsS --max-time 10 http://127.0.0.1:8000/health >/dev/null 2>&1; then
              echo "ERROR: backend /health failed on :8000"
              $COMPOSE logs --tail 100 backend 2>/dev/null || true
              FAIL=1
            else
              echo "OK: backend /health"
            fi
            if ! curl -fsS --max-time 15 http://127.0.0.1:3000/ >/dev/null 2>&1; then
              echo "ERROR: frontend not responding on :3000"
              $COMPOSE logs --tail 100 frontend 2>/dev/null || true
              FAIL=1
            else
              echo "OK: frontend :3000"
            fi
            if [ "$FAIL" -ne 0 ]; then
              echo "Deploy verification FAILED — nginx will show 502 until containers respond."
              exit 1
            fi

            # Restart nginx only after stack is healthy (avoids brief 502 during restart)
            systemctl restart nginx 2>/dev/null || service nginx restart 2>/dev/null || echo "nginx restart skipped"

            echo "Deploy done"
