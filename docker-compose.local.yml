version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: enterdebt
      POSTGRES_PASSWORD: enterdebt123
      POSTGRES_DB: enterdebt
    ports:
      - "5432:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://enterdebt:enterdebt123@db:5432/enterdebt
      SECRET_KEY: localdevkey
      ADMIN_EMAIL: admin@entergroup.uz
      ADMIN_PASSWORD: admin123
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    restart: always
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata_local:
